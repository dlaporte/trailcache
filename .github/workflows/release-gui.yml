# Build the Tauri GUI app (.dmg for macOS) and attach to the GitHub Release.
# Triggered by the same version tags as the TUI release workflow.

name: Release GUI

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-gui:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: crates/trailcache-gui
        run: npm ci

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import certificate.p12 -k $KEYCHAIN_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          # Debug: show what was imported
          echo "=== Identities in keychain ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo "=== Test codesign access ==="
          security find-identity -v -p codesigning
          rm certificate.p12

      - name: Build Tauri app
        working-directory: crates/trailcache-gui
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Ensure keychain is still unlocked before build
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/build.keychain-db
          npm run tauri build

      - name: Upload .dmg to GitHub Release
        run: |
          # Wait briefly for the TUI release workflow to create the GitHub Release
          for i in 1 2 3 4 5; do
            if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for release to be created... (attempt $i)"
            sleep 30
          done

          DMG=$(find crates/trailcache-gui/src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            gh release upload "${{ github.ref_name }}" "$DMG" --clobber
          else
            echo "No .dmg found, skipping upload"
            exit 1
          fi
